<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Pomodoro Focus</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #d6eeff 50%, #eef6ff 100%);
            color: #1864ab;
        }

        .card {
            width: min(90vw, 420px);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid #aee2ff;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 8px 30px rgba(130, 190, 240, 0.35);
            text-align: center;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.4rem;
        }

        p {
            margin: 0.4rem 0;
            line-height: 1.45;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>You are offline</h1>
        <p>Pomodoro Focus is still available with cached pages.</p>
        <p>Reconnect to sync and fetch the latest updates.</p>
    </main>
</body>

</html>
